name: Feature request
description: Suggest an improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to happen?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Scanning
        - Manual organizer
        - Review Changes
        - AI export/import
        - Backup/Apply/Rollback
        - Documentation
        - Other
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: This request does not require sharing mod files, paid/private mods, credentials, or full Penumbra configs.
          required: true
